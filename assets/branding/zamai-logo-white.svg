    <circle cx="0" cy="-112" r="13" fill="#FFFFFF"/>
    <circle cx="-27" cy="-83" r="8" fill="rgba(255,255,255,0.75)"/>
    <circle cx="27" cy="-83" r="8" fill="rgba(255,255,255,0.75)"/>
    <g transform="rotate(60)">
