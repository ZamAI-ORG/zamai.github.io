      <line x1="0" y1="-68" x2="-27" y2="-83" stroke="rgba(255,255,255,0.6)" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="-68" x2="27" y2="-83" stroke="rgba(255,255,255,0.6)" stroke-width="7" stroke-linecap="round"/>
