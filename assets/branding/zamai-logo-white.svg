    font-size="44"
    font-weight="800"
    letter-spacing="-1.5"
    fill="#FFFFFF"
  >Zam</text>
  <text
    x="218" y="55"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="44"
    font-weight="800"
